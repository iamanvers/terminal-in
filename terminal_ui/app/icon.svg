<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- TERMINAL//IN mark — flat, no gradients. Dark tile, candle bars in the
       electric-blue ramp, the double-slash brand glyph cutting through. -->
  <rect width="64" height="64" rx="14" fill="#0A0B0D"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#23272E" stroke-width="2"/>
  <!-- candles -->
  <rect x="12" y="30" width="7" height="16" rx="1.5" fill="#004AF8"/>
  <rect x="15" y="25" width="1.6" height="26" fill="#004AF8"/>
  <rect x="26" y="20" width="7" height="20" rx="1.5" fill="#0094FB"/>
  <rect x="29" y="14" width="1.6" height="32" fill="#0094FB"/>
  <rect x="40" y="12" width="7" height="16" rx="1.5" fill="#00B9FC"/>
  <rect x="43" y="7"  width="1.6" height="28" fill="#00B9FC"/>
  <!-- double-slash glyph -->
  <path d="M25 56 L33 40" stroke="#ECEEF1" stroke-width="3.4" stroke-linecap="round"/>
  <path d="M34 56 L42 40" stroke="#ECEEF1" stroke-width="3.4" stroke-linecap="round"/>
</svg>
