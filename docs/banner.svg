<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 150" width="620" height="150" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace">
  <!-- TERMINAL//IN logo — mark + wordmark only (design-system palette). -->
  <rect width="620" height="150" rx="18" fill="#0A0B0D"/>
  <rect x="1.5" y="1.5" width="617" height="147" rx="16.5" fill="none" stroke="#23272E" stroke-width="3"/>

  <!-- brand mark (from app/icon.svg, candle ramp + double-slash glyph) -->
  <g transform="translate(48,43)">
    <rect x="6" y="30" width="7" height="16" rx="1.5" fill="#004AF8"/>
    <rect x="9" y="25" width="1.6" height="21" fill="#004AF8"/>
    <rect x="20" y="20" width="7" height="20" rx="1.5" fill="#0094FB"/>
    <rect x="23" y="14" width="1.6" height="26" fill="#0094FB"/>
    <rect x="34" y="12" width="7" height="16" rx="1.5" fill="#00B9FC"/>
    <rect x="37" y="7"  width="1.6" height="28" fill="#00B9FC"/>
    <path d="M30 56 L38 40" stroke="#ECEEF1" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M39 56 L47 40" stroke="#ECEEF1" stroke-width="3.4" stroke-linecap="round"/>
  </g>

  <!-- wordmark -->
  <text x="138" y="90" font-size="46" font-weight="700" letter-spacing="1">
    <tspan fill="#ECEEF1">TERMINAL</tspan><tspan fill="#00B9FC">//</tspan><tspan fill="#ECEEF1">IN</tspan>
  </text>
  <rect x="140" y="106" width="110" height="4" rx="2" fill="#0094FB"/>
</svg>
